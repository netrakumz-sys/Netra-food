<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netra Food & WhatsApp Ordering</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Load Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Initial Sample Food Data with Rupee values
        const INITIAL_FOOD_ITEMS = [
            { id: 1, name: 'Artisanal Sourdough Bread', price: 150, category: 'Bakery', image: 'https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=500' },
            { id: 2, name: 'Organic Heirloom Tomatoes', price: 80, category: 'Produce', image: 'https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=500' },
            { id: 3, name: 'Cold-Pressed Green Juice', price: 120, category: 'Beverages', image: 'https://images.unsplash.com/photo-1610970881699-44a5587cabec?w=500' }
        ];

        function FoodStore() {
            // States
            const [products, setProducts] = useState(INITIAL_FOOD_ITEMS);
            const [categories, setCategories] = useState(['All', 'Produce', 'Bakery', 'Beverages', 'Pantry']);
            const [activeCategory, setActiveCategory] = useState('All');
            
            // Views
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            
            // Ordering Flow States
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [customerName, setCustomerName] = useState('');
            const [customerMobile, setCustomerMobile] = useState('');
            const [customerLocation, setCustomerLocation] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('COD');

            // Admin Login Form State
            const [usernameInput, setUsernameInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');

            // Admin Add Product Form State
            const [newProdName, setNewProdName] = useState('');
            const [newProdPrice, setNewProdPrice] = useState('');
            const [newProdCategory, setNewProdCategory] = useState('Produce');
            const [newProdImage, setNewProdImage] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (usernameInput === 'Netra' && passwordInput === 'Netra9900') {
                    setIsLoggedIn(true);
                    setLoginError('');
                } else {
                    setLoginError('Invalid Username or Password!');
                }
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                if (!newProdName || !newProdPrice || !newProdImage) {
                    alert('Please fill out all fields!');
                    return;
                }
                const newProduct = {
                    id: Date.now(),
                    name: newProdName,
                    price: parseFloat(newProdPrice),
                    category: newProdCategory,
                    image: newProdImage
                };
                setProducts([...products, newProduct]);
                setNewProdName('');
                setNewProdPrice('');
                setNewProdImage('');
                alert('Product published successfully!');
            };

            const handlePlaceOrder = (e) => {
                e.preventDefault();
                if (!customerName || !customerMobile || !customerLocation) {
                    alert('Please fill in your name, mobile number, and location!');
                    return;
                }

                // WhatsApp message with Rupee formatting
                const textMessage = `🛍️ *NEW ORDER RECEIVED FROM NETRA FOOD* 🛍️\n\n` +
                                   `👤 *Customer Name:* ${customerName}\n` +
                                   `📞 *Mobile:* ${customerMobile}\n` +
                                   `📍 *Location:* ${customerLocation}\n\n` +
                                   `📦 *Product:* ${selectedProduct.name}\n` +
                                   `💵 *Price:* ₹${selectedProduct.price}\n` +
                                   `💳 *Payment Mode:* ${paymentMethod === 'COD' ? '💵 Cash on Delivery (COD)' : '📱 Online Payment'}\n\n` +
                                   `Please confirm my order!`;

                const encodedMessage = encodeURIComponent(textMessage);
                window.open(`https://wa.me/916901646781?text=${encodedMessage}`, '_blank');
                
                setSelectedProduct(null);
                setCustomerName('');
                setCustomerMobile('');
                setCustomerLocation('');
            };

            const filteredItems = activeCategory === 'All' 
                ? products 
                : products.filter(item => item.category === activeCategory);

            // --- ADMIN VIEW ---
            if (isAdminMode) {
                return (
                    <div className="min-h-screen bg-slate-100 py-10 px-4">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h1 className="text-3xl font-extrabold text-slate-900">Netra Food Admin</h1>
                                <button onClick={() => setIsAdminMode(false)} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-slate-700">
                                    ← Back to Store Front
                                </button>
                            </div>

                            {!isLoggedIn ? (
                                <div className="max-w-md mx-auto bg-white rounded-2xl p-8 shadow-md border border-slate-200">
                                    <h2 className="text-xl font-bold mb-6 text-center text-slate-800">Secure Admin Login</h2>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                                            <input type="text" value={usernameInput} onChange={(e) => setUsernameInput(e.target.value)} className="w-full px-4 py-2 border rounded-xl focus:outline-emerald-600"/>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full px-4 py-2 border rounded-xl focus:outline-emerald-600"/>
                                        </div>
                                        {loginError && <p className="text-rose-600 text-sm font-medium">{loginError}</p>}
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-2.5 rounded-xl font-semibold hover:bg-emerald-700">
                                            Access Dashboard
                                        </button>
                                    </form>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                                        <h2 className="text-lg font-bold mb-4">Add New Food Item</h2>
                                        <form onSubmit={handleAddProduct} className="space-y-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Item Name</label>
                                                <input type="text" value={newProdName} onChange={(e) => setNewProdName(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm"/>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Price (₹)</label>
                                                <input type="number" value={newProdPrice} onChange={(e) => setNewProdPrice(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm"/>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Category</label>
                                                <select value={newProdCategory} onChange={(e) => setNewProdCategory(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm bg-white">
                                                    {categories.filter(c => c !== 'All').map(cat => (
                                                        <option key={cat} value={cat}>{cat}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Image URL</label>
                                                <input type="text" value={newProdImage} onChange={(e) => setNewProdImage(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm"/>
                                            </div>
                                            <button type="submit" className="w-full bg-emerald-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-emerald-700">
                                                + Live Publish Product
                                            </button>
                                        </form>
                                    </div>

                                    <div className="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <h2 className="text-lg font-bold mb-4">Current Menu Stock ({products.length})</h2>
                                        <div className="divide-y divide-slate-100 max-h-[450px] overflow-y-auto pr-2">
                                            {products.map(item => (
                                                <div key={item.id} className="py-3 flex items-center gap-4">
                                                    <img src={item.image} className="w-12 h-12 object-cover rounded-lg bg-slate-100" />
                                                    <div className="flex-1">
                                                        <h4 className="text-sm font-bold">{item.name}</h4>
                                                        <span className="text-xs bg-slate-100 px-2 py-0.5 rounded text-slate-600">{item.category}</span>
                                                    </div>
                                                    <p className="font-bold text-emerald-600 text-sm">₹{item.price}</p>
                                                    <button onClick={() => setProducts(products.filter(p => p.id !== item.id))} className="text-xs text-rose-500 hover:underline">Delete</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // --- MAIN STOREFRONT VIEW ---
            return (
                <div className="min-h-screen">
                    <header className="sticky top-0 z-40 w-full bg-white border-b border-slate-200 shadow-sm backdrop-blur-md bg-white/90">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <span className="text-xl font-bold tracking-tight text-slate-900">
                                Netra<span className="text-emerald-600">Food</span>
                            </span>
                            <button onClick={() => setIsAdminMode(true)} className="text-xs font-semibold text-slate-500 hover:text-emerald-600 border border-slate-200 rounded-lg px-3 py-1.5 hover:bg-slate-50 transition-colors">
                                {isLoggedIn ? '⚙️ Admin Panel' : '🔒 Admin Login'}
                            </button>
                        </div>
                    </header>

                    <section className="bg-gradient-to-br from-emerald-950 to-emerald-900 text-white py-12 px-4 text-center space-y-4">
                        <span className="inline-block px-3 py-1 bg-emerald-800/60 rounded-full text-emerald-300 font-medium text-xs tracking-wider uppercase">WhatsApp Instant Orders</span>
                        <h1 className="text-4xl font-extrabold tracking-tight">Fresh Food Sent Directly to Your WhatsApp</h1>
                        <p className="text-emerald-200/80 max-w-xl mx-auto text-sm">Choose an item, input your details, and place your order instantly!</p>
                    </section>

                    <main className="max-w-7xl mx-auto px-4 py-10">
                        {/* Categories */}
                        <div className="flex items-center gap-2 overflow-x-auto pb-4 mb-8">
                            {categories.map((cat) => (
                                <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${activeCategory === cat ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* Store Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                            {filteredItems.map((item) => (
                                <div key={item.id} className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                                    <img src={item.image} alt={item.name} className="h-48 w-full object-cover" />
                                    <div className="p-5 flex flex-col flex-grow justify-between gap-4">
                                        <div>
                                            <h3 className="font-semibold text-slate-800 text-lg leading-tight mb-1">{item.name}</h3>
                                            <p className="text-emerald-700 font-bold text-xl">₹{item.price}</p>
                                        </div>
                                        <button onClick={() => setSelectedProduct(item)} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl transition-colors flex items-center justify-center gap-2">
                                            ⚡ Direct Order
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* DIRECT ORDER MODAL POPUP FORM */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-xs" onClick={() => setSelectedProduct(null)} />
                            
                            <div className="relative bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 z-10 space-y-4">
                                <div className="flex justify-between items-center border-b pb-3">
                                    <h3 className="text-lg font-bold text-slate-900">Complete Your Order</h3>
                                    <button onClick={() => setSelectedProduct(null)} className="text-slate-400 hover:text-slate-600 text-xl font-bold">✕</button>
                                </div>

                                <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border">
                                    <img src={selectedProduct.image} className="w-12 h-12 object-cover rounded-lg"/>
                                    <div>
                                        <h4 className="text-sm font-bold text-slate-800">{selectedProduct.name}</h4>
                                        <p className="text-sm font-bold text-emerald-600">₹{selectedProduct.price}</p>
                                    </div>
                                </div>

                                <form onSubmit={handlePlaceOrder} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Full Name</label>
                                        <input type="text" required value={customerName} onChange={(e) => setCustomerName(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" placeholder="e.g. John Doe"/>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Mobile Number</label>
                                        <input type="tel" required value={customerMobile} onChange={(e) => setCustomerMobile(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" placeholder="e.g. +91 9876543210"/>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Delivery Location / Address</label>
                                        <textarea required rows="2" value={customerLocation} onChange={(e) => setCustomerLocation(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" placeholder="Enter complete street address, apartment, city"></textarea>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-2">Payment Method</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <label className={`flex items-center justify-center p-3 border rounded-xl cursor-pointer text-sm font-semibold transition-all ${paymentMethod === 'COD' ? 'border-emerald-600 bg-emerald-50 text-emerald-700' : 'bg-white text-slate-600'}`}>
                                                <input type="radio" name="payment" value="COD" checked={paymentMethod === 'COD'} onChange={() => setPaymentMethod('COD')} className="sr-only" />
                                                💵 Cash on Delivery
                                            </label>
                                            <label className={`flex items-center justify-center p-3 border rounded-xl cursor-pointer text-sm font-semibold transition-all ${paymentMethod === 'ONLINE' ? 'border-emerald-600 bg-emerald-50 text-emerald-700' : 'bg-white text-slate-600'}`}>
                                                <input type="radio" name="payment" value="ONLINE" checked={paymentMethod === 'ONLINE'} onChange={() => setPaymentMethod('ONLINE')} className="sr-only" />
                                                📱 Online Payment
                                            </label>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2 mt-2">
                                        💬 Order via WhatsApp
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FoodStore />);
    </script>
</body>
</html>
